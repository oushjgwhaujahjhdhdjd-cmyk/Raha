<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>راحة - متجرك الإلكتروني</title>
<style>
body{font-family:'Cairo',sans-serif;background:#f8f9fa;margin:0;padding:20px;text-align:center}
h1{color:#2c3e50;font-size:32px}
.box{background:white;padding:40px 30px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);max-width:500px;margin:80px auto}
p{color:#555;font-size:18px}
button{background:#27ae60;color:white;border:none;padding:15px 40px;border-radius:10px;font-size:18px;cursor:pointer;margin-top:20px}
</style>
</head>
<body>
<div class="box">
<h1>مرحبا بك في راحة</h1>
<p>أول متجر إلكتروني خاص بك على الإنترنت</p>
<button>تسوق الآن</button>
</div>
</body>
</html>
